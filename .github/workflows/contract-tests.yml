name: Reusable Workflow Contract Tests

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - "fixtures/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.yml"
      - "fixtures/**"

permissions:
  contents: read
  packages: read

jobs:
  go-contract:
    uses: ./.github/workflows/ci.yml
    with:
      tasks: "go-test,go-vet,go-fmt"
      concurrency-suffix: go-smoke
      cancel-in-progress: false
    env:
      MISE_GO_WORKING_DIR: fixtures/go

  go-build-contract:
    uses: ./.github/workflows/ci.yml
    with:
      tasks: "go-build"
      concurrency-suffix: go-build
      cancel-in-progress: false
    env:
      MISE_GO_WORKING_DIR: fixtures/go
      MISE_GO_BUILD_COMMAND: "go test -c -o /tmp/workflow-fixture.test ."

  go-coverage-contract:
    uses: ./.github/workflows/ci.yml
    with:
      tasks: "go-test"
      concurrency-suffix: go-coverage
      cancel-in-progress: false
    env:
      MISE_GO_WORKING_DIR: fixtures/go
      MISE_GO_TEST_COMMAND: "go test -coverprofile=coverage.out ./..."

  go-lint-contract:
    needs: go-contract
    uses: ./.github/workflows/ci.yml
    with:
      tasks: "go-lint"
      concurrency-suffix: go-lint
      cancel-in-progress: false
    env:
      MISE_GO_WORKING_DIR: fixtures/go

  node-contract:
    uses: ./.github/workflows/ci.yml
    with:
      tasks: "node-install,node-test"
      concurrency-suffix: node-smoke
      cancel-in-progress: false
    env:
      MISE_NODE_WORKING_DIR: fixtures/node
      MISE_NODE_PACKAGE_MANAGER: npm

  node-contract-extended:
    needs: node-contract
    uses: ./.github/workflows/ci.yml
    with:
      tasks: "node-install,node-build,node-test"
      concurrency-suffix: node-extended
      cancel-in-progress: false
    env:
      MISE_NODE_WORKING_DIR: fixtures/node
      MISE_NODE_PACKAGE_MANAGER: npm
      MISE_NODE_TEST_SCRIPT: test:ci

  bun-contract:
    uses: ./.github/workflows/ci.yml
    with:
      tasks: "bun-install,bun-lint,bun-test"
      concurrency-suffix: bun-smoke
      cancel-in-progress: false
    env:
      MISE_BUN_WORKING_DIR: fixtures/bun
      MISE_BUN_FROZEN_LOCKFILE: "false"
