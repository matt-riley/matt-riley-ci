name: Reusable Workflow Contract Tests

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - "fixtures/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.yml"
      - "fixtures/**"

permissions:
  contents: read
  packages: read

jobs:
  go-contract:
    uses: ./.github/workflows/go-ci.yml
    with:
      go-version-file: fixtures/go/go.mod
      working-directory: fixtures/go
      concurrency-suffix: smoke
      run-race: false
      run-vet: true
      run-fmt: true
      cancel-in-progress: false

  go-build-contract:
    uses: ./.github/workflows/go-ci.yml
    with:
      go-version-file: fixtures/go/go.mod
      working-directory: fixtures/go
      run-test: false
      run-vet: false
      build-command: go test -c -o /tmp/workflow-fixture.test .
      cancel-in-progress: false
      concurrency-suffix: build

  go-coverage-contract:
    uses: ./.github/workflows/go-ci.yml
    with:
      go-version-file: fixtures/go/go.mod
      working-directory: fixtures/go
      run-vet: false
      test-command: go test -coverprofile=coverage.out ./...
      coverage-path: coverage.out
      coverage-artifact-name: go-coverage
      cancel-in-progress: false
      concurrency-suffix: coverage

  go-lint-contract:
    needs: go-contract
    uses: ./.github/workflows/go-lint.yml
    with:
      go-version-file: fixtures/go/go.mod
      working-directory: fixtures/go
      continue-on-error: false
      cancel-in-progress: false

  node-contract:
    uses: ./.github/workflows/node-ci.yml
    with:
      package-manager: npm
      working-directory: fixtures/node
      require-lockfile: true
      run-lint: false
      run-build: false
      run-test: true
      cancel-in-progress: false
      concurrency-suffix: smoke

  node-contract-extended:
    needs: node-contract
    uses: ./.github/workflows/node-ci.yml
    with:
      package-manager: npm
      working-directory: fixtures/node
      require-lockfile: true
      install-command: npm ci
      run-lint: false
      run-build: true
      run-test: true
      test-script: test:ci
      verify-lockfile-clean: true
      lockfile-path: fixtures/node/package-lock.json
      build-env: |
        API_ENDPOINT_URL=https://api.example.com
      cancel-in-progress: false
      concurrency-suffix: extended

  bun-contract:
    uses: ./.github/workflows/bun-ci.yml
    with:
      working-directory: fixtures/bun
      frozen-lockfile: false
      require-lockfile: false
      run-lint: true
      run-test: true
      cancel-in-progress: false
