name: Reusable Workflow Contract Tests

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - "fixtures/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.yml"
      - "fixtures/**"

permissions:
  contents: read
  packages: read

jobs:
  go-contract:
    uses: ./.github/workflows/ci.yml
    with:
      test: true
      vet: true
      fmt: true
      task-prefix: "go-"
      task-env: |
        MISE_GO_WORKING_DIR=fixtures/go
      concurrency-suffix: go-smoke
      cancel-in-progress: false

  go-build-contract:
    uses: ./.github/workflows/ci.yml
    with:
      build: true
      task-prefix: "go-"
      task-env: |
        MISE_GO_WORKING_DIR=fixtures/go
        MISE_GO_BUILD_COMMAND=go test -c -o /tmp/workflow-fixture.test .
      concurrency-suffix: go-build
      cancel-in-progress: false

  go-coverage-contract:
    uses: ./.github/workflows/ci.yml
    with:
      test: true
      task-prefix: "go-"
      task-env: |
        MISE_GO_WORKING_DIR=fixtures/go
        MISE_GO_TEST_COMMAND=go test -coverprofile=coverage.out ./...
      concurrency-suffix: go-coverage
      cancel-in-progress: false

  go-lint-contract:
    needs: go-contract
    uses: ./.github/workflows/ci.yml
    with:
      lint: true
      task-prefix: "go-"
      task-env: |
        MISE_GO_WORKING_DIR=fixtures/go
      concurrency-suffix: go-lint
      cancel-in-progress: false

  node-contract:
    uses: ./.github/workflows/ci.yml
    with:
      install: true
      test: true
      task-prefix: "node-"
      task-env: |
        MISE_NODE_WORKING_DIR=fixtures/node
        MISE_NODE_PACKAGE_MANAGER=npm
      concurrency-suffix: node-smoke
      cancel-in-progress: false

  node-build-contract:
    uses: ./.github/workflows/ci.yml
    with:
      install: true
      build: true
      task-prefix: "node-"
      task-env: |
        MISE_NODE_WORKING_DIR=fixtures/node
        MISE_NODE_PACKAGE_MANAGER=npm
        API_ENDPOINT_URL=https://example.test
      concurrency-suffix: node-build
      cancel-in-progress: false

  node-custom-test-contract:
    uses: ./.github/workflows/ci.yml
    with:
      install: true
      test: true
      task-prefix: "node-"
      task-env: |
        MISE_NODE_WORKING_DIR=fixtures/node
        MISE_NODE_PACKAGE_MANAGER=npm
        MISE_NODE_TEST_SCRIPT=test:ci
      concurrency-suffix: node-custom-test
      cancel-in-progress: false

  bun-contract:
    uses: ./.github/workflows/ci.yml
    with:
      install: true
      lint: true
      test: true
      task-prefix: "bun-"
      task-env: |
        MISE_BUN_WORKING_DIR=fixtures/bun
        MISE_BUN_FROZEN_LOCKFILE=false
      concurrency-suffix: bun-smoke
      cancel-in-progress: false
