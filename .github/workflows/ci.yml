name: Universal CI

on:
  workflow_call:
    inputs:
      install:
        description: 'Run the mise install task'
        required: false
        default: false
        type: boolean
      lint:
        description: 'Run the mise lint task'
        required: false
        default: false
        type: boolean
      build:
        description: 'Run the mise build task'
        required: false
        default: false
        type: boolean
      test:
        description: 'Run the mise test task'
        required: false
        default: false
        type: boolean
      vet:
        description: 'Run the mise vet task'
        required: false
        default: false
        type: boolean
      fmt:
        description: 'Run the mise fmt task'
        required: false
        default: false
        type: boolean
      task-prefix:
        description: 'Optional prefix added before standard task names (for example "go-" -> "go-test")'
        required: false
        default: ''
        type: string
      task-env:
        description: 'Optional multiline KEY=VALUE entries exported before running mise tasks'
        required: false
        default: ''
        type: string
      runner:
        description: 'Runner label'
        required: false
        default: 'ubuntu-latest'
        type: string
      timeout-minutes:
        description: 'Job timeout in minutes'
        required: false
        default: 15
        type: number
      cancel-in-progress:
        description: 'Cancel previous in-progress runs for same ref'
        required: false
        default: false
        type: boolean
      concurrency-suffix:
        description: 'Optional suffix to distinguish concurrency groups'
        required: false
        default: ''
        type: string
      working-directory:
        description: 'Working directory for run steps. Note: the mise tasks handle working directories through task-env (e.g. MISE_GO_WORKING_DIR). This input exists for backwards compatibility with callers that pass it.'
        required: false
        default: '.'
        type: string

jobs:
  ci:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    concurrency:
      group: ${{ inputs.concurrency-suffix != '' && format('{0}:{1}:{2}:{3}', github.workflow, github.repository, github.ref, inputs.concurrency-suffix) || format('{0}:{1}:{2}', github.workflow, github.repository, github.ref) }}
      cancel-in-progress: ${{ inputs.cancel-in-progress }}
    permissions:
      contents: read
      packages: read
    env:
      MISE_EXPERIMENTAL: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      # Caches restore before `mise run install` ships the package modules /
      # Playwright browsers; actions/cache auto-saves at job end. Each step
      # is gated on its lockfile so a Go repo never caches pnpm and vice versa.
      - name: Cache pnpm store
        if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.cache/pnpm
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache npm cache
        if: ${{ hashFiles('package-lock.json') != '' && hashFiles('pnpm-lock.yaml') == '' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Cache Go modules and build cache
        if: ${{ hashFiles('go.mod') != '' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Cache Playwright browser binaries
        # Restored before `mise run install` (which installs browsers) and
        # saved after the install task populates them. Keyed by runner OS so
        # Linux/mac binaries never cross-contaminate. Skipped for repos with
        # no Playwright config.
        if: ${{ hashFiles('**/playwright.config.ts', '**/playwright.config.js') != '' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/playwright.config.ts', '**/playwright.config.js') }}-v1

      - name: Export task environment
        if: ${{ inputs.task-env != '' }}
        env:
          TASK_ENV: ${{ inputs.task-env }}
        run: |
          task_env_file="$RUNNER_TEMP/universal-ci-task-env"
          printf '%s\n' "$TASK_ENV" > "$task_env_file"
          while IFS= read -r line || [ -n "$line" ]; do
            if [ -n "$line" ]; then
              printf '%s\n' "$line" >> "$GITHUB_ENV"
            fi
          done < "$task_env_file"
          rm -f "$task_env_file"

      - name: Run install task
        if: ${{ inputs.install }}
        run: mise run "${{ inputs.task-prefix }}install"

      - name: Run lint task
        if: ${{ inputs.lint }}
        run: mise run "${{ inputs.task-prefix }}lint"

      - name: Run build task
        if: ${{ inputs.build }}
        run: mise run "${{ inputs.task-prefix }}build"

      - name: Run test task
        if: ${{ inputs.test }}
        run: mise run "${{ inputs.task-prefix }}test"

      - name: Run vet task
        if: ${{ inputs.vet }}
        run: mise run "${{ inputs.task-prefix }}vet"

      - name: Run fmt task
        if: ${{ inputs.fmt }}
        run: mise run "${{ inputs.task-prefix }}fmt"

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "### Universal CI summary"
            echo "- runner: \`${{ inputs.runner }}\`"
            echo "- timeout-minutes: \`${{ inputs.timeout-minutes }}\`"
            echo "- task-prefix: \`${{ inputs.task-prefix }}\`"
            echo "- task-env provided: \`${{ inputs.task-env != '' }}\`"
            echo "- install: \`${{ inputs.install }}\`"
            echo "- lint: \`${{ inputs.lint }}\`"
            echo "- build: \`${{ inputs.build }}\`"
            echo "- test: \`${{ inputs.test }}\`"
            echo "- vet: \`${{ inputs.vet }}\`"
            echo "- fmt: \`${{ inputs.fmt }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
