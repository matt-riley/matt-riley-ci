name: Go Lint

on:
  workflow_call:
    inputs:
      go-version-file:
        description: 'Path to go.mod'
        required: false
        default: 'go.mod'
        type: string
      runner:
        description: 'Runner label'
        required: false
        default: 'ubuntu-latest'
        type: string
      working-directory:
        description: 'Directory to run commands in'
        required: false
        default: '.'
        type: string
      golangci-version:
        description: 'golangci-lint version'
        required: false
        default: 'v2.10.1'
        type: string
      golangci-args:
        description: 'Additional golangci-lint args'
        required: false
        default: '--timeout=5m'
        type: string
      continue-on-error:
        description: 'Continue if golangci-lint reports issues'
        required: false
        default: false
        type: boolean
      timeout-minutes:
        description: 'Job timeout in minutes'
        required: false
        default: 15
        type: number
      cancel-in-progress:
        description: 'Cancel previous in-progress runs for same ref'
        required: false
        default: false
        type: boolean
      concurrency-suffix:
        description: 'Optional suffix to distinguish concurrency groups when this reusable workflow is called multiple times in one workflow'
        required: false
        default: ''
        type: string

jobs:
  lint:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    concurrency:
      group: ${{ inputs.concurrency-suffix != '' && format('{0}:{1}:{2}:{3}', github.workflow, github.repository, github.ref, inputs.concurrency-suffix) || format('{0}:{1}:{2}', github.workflow, github.repository, github.ref) }}
      cancel-in-progress: ${{ inputs.cancel-in-progress }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
          cache-dependency-path: ${{ inputs.go-version-file }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: ${{ inputs.golangci-version }}
          args: ${{ inputs.golangci-args }}
          working-directory: ${{ inputs.working-directory }}
        continue-on-error: ${{ inputs.continue-on-error }}

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "### Go Lint summary"
            echo "- runner: \`${{ inputs.runner }}\`"
            echo "- working-directory: \`${{ inputs.working-directory }}\`"
            echo "- golangci-version: \`${{ inputs.golangci-version }}\`"
            echo "- golangci-args: \`${{ inputs.golangci-args }}\`"
            echo "- continue-on-error: \`${{ inputs.continue-on-error }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
