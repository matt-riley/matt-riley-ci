name: Node CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node version'
        required: false
        default: '22'
        type: string
      runner:
        description: 'Runner label'
        required: false
        default: 'ubuntu-latest'
        type: string
      package-manager:
        description: 'Package manager (npm, pnpm, yarn)'
        required: false
        default: 'pnpm'
        type: string
      pnpm-version:
        description: 'Pinned pnpm version (only used when package-manager=pnpm)'
        required: false
        default: ''
        type: string
      working-directory:
        description: 'Directory to run commands in'
        required: false
        default: '.'
        type: string
      cache-dependency-path:
        description: 'Dependency file(s) for cache key'
        required: false
        default: ''
        type: string
      require-lockfile:
        description: 'Fail if expected lockfile for package manager is missing'
        required: false
        default: false
        type: boolean
      install-command:
        description: 'Override dependency install command. Empty uses package manager default.'
        required: false
        default: ''
        type: string
      run-lint:
        description: 'Run lint script'
        required: false
        default: true
        type: boolean
      run-fallow:
        description: 'Run fallow audit'
        required: false
        default: true
        type: boolean
      run-knip:
        description: 'Run knip check'
        required: false
        default: true
        type: boolean
      run-test:
        description: 'Run test script'
        required: false
        default: true
        type: boolean
      run-build:
        description: 'Run build script'
        required: false
        default: false
        type: boolean
      test-script:
        description: 'Test script name to run'
        required: false
        default: 'test'
        type: string
      verify-lockfile-clean:
        description: 'Fail if lockfile has uncommitted changes after install'
        required: false
        default: false
        type: boolean
      lockfile-path:
        description: 'Explicit lockfile path for lockfile checks'
        required: false
        default: ''
        type: string
      build-env:
        description: 'Build step environment variables as multiline KEY=VALUE'
        required: false
        default: ''
        type: string
      timeout-minutes:
        description: 'Job timeout in minutes'
        required: false
        default: 15
        type: number
      cancel-in-progress:
        description: 'Cancel previous in-progress runs for same ref'
        required: false
        default: false
        type: boolean
      concurrency-suffix:
        description: 'Optional suffix to distinguish concurrency groups when this reusable workflow is called multiple times in one workflow'
        required: false
        default: ''
        type: string
    secrets:
      node_auth_token:
        description: 'Optional registry auth token exposed to package-manager commands as NODE_AUTH_TOKEN'
        required: false

jobs:
  ci:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    concurrency:
      group: ${{ inputs.concurrency-suffix != '' && format('{0}:{1}:{2}:{3}', github.workflow, github.repository, github.ref, inputs.concurrency-suffix) || format('{0}:{1}:{2}', github.workflow, github.repository, github.ref) }}
      cancel-in-progress: ${{ inputs.cancel-in-progress }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm (default)
        if: ${{ inputs.package-manager == 'pnpm' && inputs.pnpm-version == '' }}
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Install pnpm (pinned)
        if: ${{ inputs.package-manager == 'pnpm' && inputs.pnpm-version != '' }}
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Validate package manager
        id: pm
        run: |
          case "${{ inputs.package-manager }}" in
            npm)
              echo "lockfile=${{ inputs.working-directory }}/package-lock.json" >> "$GITHUB_OUTPUT"
              ;;
            pnpm)
              echo "lockfile=${{ inputs.working-directory }}/pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
              ;;
            yarn)
              echo "lockfile=${{ inputs.working-directory }}/yarn.lock" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported package manager: ${{ inputs.package-manager }}" >&2
              exit 1
              ;;
          esac

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.cache-dependency-path != '' && inputs.cache-dependency-path || steps.pm.outputs.lockfile }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.node_auth_token || github.token }}

      - name: Validate lockfile
        if: ${{ inputs.require-lockfile }}
        run: |
          expected_lockfile="${{ inputs.lockfile-path != '' && inputs.lockfile-path || steps.pm.outputs.lockfile }}"
          if [ ! -f "$expected_lockfile" ]; then
            echo "Expected lockfile not found: $expected_lockfile" >&2
            exit 1
          fi

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Install dependencies
        run: |
          export MISE_NODE_WORKING_DIR="${{ inputs.working-directory }}"
          export MISE_NODE_INSTALL_COMMAND="${{ inputs.install-command }}"
          mise run node-install
        working-directory: ${{ inputs.working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.node_auth_token || github.token }}
          MISE_EXPERIMENTAL: true

      - name: Verify lockfile is unchanged
        if: ${{ inputs.verify-lockfile-clean }}
        run: |
          lockfile="${{ inputs.lockfile-path != '' && inputs.lockfile-path || steps.pm.outputs.lockfile }}"
          if [ ! -f "$lockfile" ]; then
            echo "Lockfile not found: $lockfile" >&2
            exit 1
          fi
          git diff --exit-code "$lockfile" || (echo "Lockfile changed after install: $lockfile" >&2 && exit 1)

      - name: Fallow
        if: ${{ inputs.run-fallow }}
        run: |
          export MISE_NODE_WORKING_DIR="${{ inputs.working-directory }}"
          mise run node-fallow
        env:
          NODE_AUTH_TOKEN: ${{ secrets.node_auth_token || github.token }}
          MISE_EXPERIMENTAL: true

      - name: Knip
        if: ${{ inputs.run-knip }}
        run: |
          export MISE_NODE_WORKING_DIR="${{ inputs.working-directory }}"
          mise run node-knip
        env:
          NODE_AUTH_TOKEN: ${{ secrets.node_auth_token || github.token }}
          MISE_EXPERIMENTAL: true

      - name: Lint
        if: ${{ inputs.run-lint }}
        run: |
          export MISE_NODE_WORKING_DIR="${{ inputs.working-directory }}"
          export MISE_NODE_PACKAGE_MANAGER="${{ inputs.package-manager }}"
          mise run node-lint
        env:
          NODE_AUTH_TOKEN: ${{ secrets.node_auth_token || github.token }}
          MISE_EXPERIMENTAL: true

      - name: Build
        if: ${{ inputs.run-build }}
        run: |
          export MISE_NODE_WORKING_DIR="${{ inputs.working-directory }}"
          export MISE_NODE_PACKAGE_MANAGER="${{ inputs.package-manager }}"
          ${{ inputs.build-env != '' && format('env {0}', inputs.build-env) || '' }} mise run node-build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.node_auth_token || github.token }}
          MISE_EXPERIMENTAL: true

      - name: Test
        if: ${{ inputs.run-test }}
        run: |
          export MISE_NODE_WORKING_DIR="${{ inputs.working-directory }}"
          export MISE_NODE_PACKAGE_MANAGER="${{ inputs.package-manager }}"
          export MISE_NODE_TEST_SCRIPT="${{ inputs.test-script }}"
          mise run node-test
        env:
          NODE_AUTH_TOKEN: ${{ secrets.node_auth_token || github.token }}
          MISE_EXPERIMENTAL: true

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "### Node CI summary"
            echo "- runner: \`${{ inputs.runner }}\`"
            echo "- timeout-minutes: \`${{ inputs.timeout-minutes }}\`"
            echo "- package-manager: \`${{ inputs.package-manager }}\`"
            echo "- pnpm-version: \`${{ inputs.pnpm-version }}\`"
            echo "- working-directory: \`${{ inputs.working-directory }}\`"
            echo "- require-lockfile: \`${{ inputs.require-lockfile }}\`"
            echo "- install-command override: \`${{ inputs.install-command != '' }}\`"
            echo "- verify-lockfile-clean: \`${{ inputs.verify-lockfile-clean }}\`"
            echo "- lockfile-path: \`${{ inputs.lockfile-path }}\`"
            echo "- run-fallow: \`${{ inputs.run-fallow }}\`"
            echo "- run-knip: \`${{ inputs.run-knip }}\`"
            echo "- run-lint: \`${{ inputs.run-lint }}\`"
            echo "- run-test: \`${{ inputs.run-test }}\`"
            echo "- test-script: \`${{ inputs.test-script }}\`"
            echo "- run-build: \`${{ inputs.run-build }}\`"
            echo "- build-env provided: \`${{ inputs.build-env != '' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
