name: Docker GHCR Publish

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label'
        required: false
        default: 'ubuntu-latest'
        type: string
      context:
        description: 'Docker build context'
        required: false
        default: '.'
        type: string
      image-name:
        description: 'Full image name (for example ghcr.io/owner/repo)'
        required: false
        default: ''
        type: string
      tag-name:
        description: 'Release tag (semver). Empty value publishes SHA tag only.'
        required: false
        default: ''
        type: string
      dockerfile:
        description: 'Path to Dockerfile (optional)'
        required: false
        default: ''
        type: string
      build-args:
        description: 'Custom build args for docker/build-push-action (multiline)'
        required: false
        default: ''
        type: string
      metadata-tags:
        description: 'Custom docker/metadata-action tags rules (multiline). Empty uses defaults.'
        required: false
        default: ''
        type: string
      metadata-flavor:
        description: 'Custom docker/metadata-action flavor rules (multiline).'
        required: false
        default: ''
        type: string
      platforms:
        description: 'Build platforms'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string
      checkout-fetch-depth:
        description: 'Fetch depth for actions/checkout'
        required: false
        default: 1
        type: number
      push:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean
      provenance:
        description: 'Enable provenance attestation in docker/build-push-action'
        required: false
        default: false
        type: boolean
      sbom:
        description: 'Enable SBOM generation in docker/build-push-action'
        required: false
        default: false
        type: boolean
      cancel-in-progress:
        description: 'Cancel previous in-progress runs for same ref'
        required: false
        default: false
        type: boolean
      timeout-minutes:
        description: 'Job timeout in minutes'
        required: false
        default: 30
        type: number
    secrets:
      token:
        description: 'Token with packages:write'
        required: true
    outputs:
      image_name:
        description: 'Resolved image name'
        value: ${{ jobs.docker-publish.outputs.image_name }}
      tags:
        description: 'Resolved image tags'
        value: ${{ jobs.docker-publish.outputs.tags }}
      labels:
        description: 'Resolved image labels'
        value: ${{ jobs.docker-publish.outputs.labels }}
      digest:
        description: 'Published image digest'
        value: ${{ jobs.docker-publish.outputs.digest }}

jobs:
  docker-publish:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    concurrency:
      group: ${{ format('{0}:{1}:{2}', github.workflow, github.repository, github.ref) }}
      cancel-in-progress: ${{ inputs.cancel-in-progress }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.image.outputs.name }}
      tags: ${{ steps.meta-custom.outputs.tags != '' && steps.meta-custom.outputs.tags || steps.meta-default.outputs.tags }}
      labels: ${{ steps.meta-custom.outputs.labels != '' && steps.meta-custom.outputs.labels || steps.meta-default.outputs.labels }}
      digest: ${{ steps.build-custom.outputs.digest != '' && steps.build-custom.outputs.digest || steps.build-default.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: ${{ inputs.checkout-fetch-depth }}

      - name: Resolve image name
        id: image
        run: |
          if [ -n "${{ inputs.image-name }}" ]; then
            echo "name=${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token }}

      - name: Extract Docker metadata (default)
        if: ${{ inputs.metadata-tags == '' }}
        id: meta-default
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{raw}},value=${{ inputs.tag-name }},enable=${{ inputs.tag-name != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag-name }},enable=${{ inputs.tag-name != '' }}
            type=semver,pattern={{major}},value=${{ inputs.tag-name }},enable=${{ inputs.tag-name != '' }}
            type=raw,value=latest,enable=${{ inputs.tag-name != '' }}
            type=sha,format=short,enable=${{ inputs.tag-name == '' }}

      - name: Extract Docker metadata (custom)
        if: ${{ inputs.metadata-tags != '' }}
        id: meta-custom
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: ${{ inputs.metadata-tags }}
          flavor: ${{ inputs.metadata-flavor }}

      - name: Build and push image (default Dockerfile)
        if: ${{ inputs.dockerfile == '' }}
        id: build-default
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ inputs.context }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta-custom.outputs.tags != '' && steps.meta-custom.outputs.tags || steps.meta-default.outputs.tags }}
          labels: ${{ steps.meta-custom.outputs.labels != '' && steps.meta-custom.outputs.labels || steps.meta-default.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ inputs.provenance }}
          sbom: ${{ inputs.sbom }}

      - name: Build and push image (custom Dockerfile)
        if: ${{ inputs.dockerfile != '' }}
        id: build-custom
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta-custom.outputs.tags != '' && steps.meta-custom.outputs.tags || steps.meta-default.outputs.tags }}
          labels: ${{ steps.meta-custom.outputs.labels != '' && steps.meta-custom.outputs.labels || steps.meta-default.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ inputs.provenance }}
          sbom: ${{ inputs.sbom }}

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "### Docker GHCR publish summary"
            echo "- image: \`${{ steps.image.outputs.name }}\`"
            echo "- context: \`${{ inputs.context }}\`"
            echo "- dockerfile: \`${{ inputs.dockerfile }}\`"
            echo "- platforms: \`${{ inputs.platforms }}\`"
            echo "- checkout-fetch-depth: \`${{ inputs.checkout-fetch-depth }}\`"
            echo "- tag-name: \`${{ inputs.tag-name }}\`"
            echo "- custom metadata tags: \`${{ inputs.metadata-tags != '' }}\`"
            echo "- build args configured: \`${{ inputs.build-args != '' }}\`"
            echo "- provenance: \`${{ inputs.provenance }}\`"
            echo "- sbom: \`${{ inputs.sbom }}\`"
            echo "- push: \`${{ inputs.push }}\`"
            echo "- digest: \`${{ steps.build-custom.outputs.digest != '' && steps.build-custom.outputs.digest || steps.build-default.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
