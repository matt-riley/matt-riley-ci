name: Go Security

on:
  workflow_call:
    inputs:
      go-version-file:
        description: 'Path to go.mod'
        required: false
        default: 'go.mod'
        type: string
      runner:
        description: 'Runner label'
        required: false
        default: 'ubuntu-latest'
        type: string
      working-directory:
        description: 'Directory to run govulncheck in'
        required: false
        default: '.'
        type: string
      govulncheck-version:
        description: 'govulncheck module version (e.g. v1.1.4; set latest to float)'
        required: false
        default: 'v1.1.4'
        type: string
      timeout-minutes:
        description: 'Job timeout in minutes'
        required: false
        default: 15
        type: number
      cancel-in-progress:
        description: 'Cancel previous in-progress runs for same ref'
        required: false
        default: false
        type: boolean
      concurrency-suffix:
        description: 'Optional suffix to distinguish concurrency groups when this reusable workflow is called multiple times in one workflow'
        required: false
        default: ''
        type: string

jobs:
  govulncheck:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    concurrency:
      group: ${{ inputs.concurrency-suffix != '' && format('{0}:{1}:{2}:{3}', github.workflow, github.repository, github.ref, inputs.concurrency-suffix) || format('{0}:{1}:{2}', github.workflow, github.repository, github.ref) }}
      cancel-in-progress: ${{ inputs.cancel-in-progress }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
          cache-dependency-path: ${{ inputs.go-version-file }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ inputs.govulncheck-version }}

      - name: Run govulncheck
        run: |
          cd ${{ inputs.working-directory }}
          govulncheck ./...

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "### Go Security summary"
            echo "- runner: \`${{ inputs.runner }}\`"
            echo "- working-directory: \`${{ inputs.working-directory }}\`"
            echo "- govulncheck-version: \`${{ inputs.govulncheck-version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
