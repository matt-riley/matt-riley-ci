name: Bun CI

on:
  workflow_call:
    inputs:
      bun-version:
        description: 'Bun version'
        required: false
        default: 'latest'
        type: string
      runner:
        description: 'Runner label'
        required: false
        default: 'ubuntu-latest'
        type: string
      working-directory:
        description: 'Directory to run commands in'
        required: false
        default: '.'
        type: string
      frozen-lockfile:
        description: 'Use --frozen-lockfile during install'
        required: false
        default: true
        type: boolean
      require-lockfile:
        description: 'Fail if bun.lock or bun.lockb is missing'
        required: false
        default: false
        type: boolean
      run-lint:
        description: 'Run bun run lint'
        required: false
        default: false
        type: boolean
      run-test:
        description: 'Run bun test'
        required: false
        default: true
        type: boolean
      timeout-minutes:
        description: 'Job timeout in minutes'
        required: false
        default: 15
        type: number
      cancel-in-progress:
        description: 'Cancel previous in-progress runs for same ref'
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    concurrency:
      group: ${{ format('{0}:{1}:{2}', github.workflow, github.repository, github.ref) }}
      cancel-in-progress: ${{ inputs.cancel-in-progress }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - name: Validate lockfile
        if: ${{ inputs.require-lockfile }}
        run: |
          if [ ! -f "${{ inputs.working-directory }}/bun.lock" ] && [ ! -f "${{ inputs.working-directory }}/bun.lockb" ]; then
            echo "Expected bun lockfile not found in ${{ inputs.working-directory }} (bun.lock or bun.lockb)" >&2
            exit 1
          fi
      - name: Install mise
        uses: jdx/mise-action@v3
      - name: Install dependencies
        run: |
          export MISE_BUN_WORKING_DIR="${{ inputs.working-directory }}"
          export MISE_BUN_FROZEN_LOCKFILE="${{ inputs.frozen-lockfile }}"
          mise run bun-install
        env:
          MISE_EXPERIMENTAL: true
      - name: Lint
        if: ${{ inputs.run-lint }}
        run: |
          export MISE_BUN_WORKING_DIR="${{ inputs.working-directory }}"
          mise run bun-lint
        env:
          MISE_EXPERIMENTAL: true
      - name: Test
        if: ${{ inputs.run-test }}
        run: |
          export MISE_BUN_WORKING_DIR="${{ inputs.working-directory }}"
          mise run bun-test
        env:
          MISE_EXPERIMENTAL: true

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "### Bun CI summary"
            echo "- runner: \`${{ inputs.runner }}\`"
            echo "- timeout-minutes: \`${{ inputs.timeout-minutes }}\`"
            echo "- working-directory: \`${{ inputs.working-directory }}\`"
            echo "- frozen-lockfile: \`${{ inputs.frozen-lockfile }}\`"
            echo "- require-lockfile: \`${{ inputs.require-lockfile }}\`"
            echo "- run-lint: \`${{ inputs.run-lint }}\`"
            echo "- run-test: \`${{ inputs.run-test }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

